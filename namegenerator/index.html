<!DOCTYPE html>
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://turntables.dev/namegenerator/UI_icon_Crown_4k.png">
    <title>Name-O-Matic</title>
    <style>
        @font-face {
            font-family: 'Asap';
            src: url('https://turntables.dev/Asap-VariableFont_wdth,wght.ttf') format('truetype');
        }
        
        body {
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #2ab0d1;
            font-family: 'Asap', sans-serif;
            box-sizing: border-box;
        }
        
        #nameContainer {
            display: flex;
            width: 614px;
            height: 174px;
            background-image: url('https://turntables.dev/namegenerator/Banner_Monarch.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(8px 8px 0px rgba(0, 0, 0, 1));
        }

        #nameContainer.pulse {
            animation: pulseContainer 0.25s ease-in-out;
        }

        #iconArea {
            width: 25%;
            height: 174px;
        }

        #nameDisplay {
            width: 75%;
            height: 174px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 3px 3px 0px rgba(0, 0, 0, 0.4);
            user-select: none;
            padding: 20px;
            box-sizing: border-box;
            font-size: clamp(0.8rem, 5vw, 2.1rem);
            text-align: center;
            word-wrap: break-word;
            font-family: 'Asap', sans-serif;
            transform: translateY(-28px);
            font-weight: bold;
            overflow: hidden;
        }

        #nameDisplay.pulse {
            animation: pulseText 0.6s ease-in-out;
        }

        @keyframes pulseContainer {
            0% {
                transform: scaleX(1) scaleY(1);
            }
            50% {
                transform: scaleX(1.2) scaleY(1.2);
            }
            100% {
                transform: scaleX(1) scaleY(1);
            }
        }

        @keyframes pulseText {
            0% {
                transform: scale(1) translateY(-28px);
                color: white;
            }
            30% {
                transform: scale(1.4) translateY(-28px);
                color: #fdf41e;
            }
            60% {
                transform: scale(0.95) translateY(-28px);
                color: #fdf41e;
            }
            100% {
                transform: scale(1) translateY(-28px);
                color: white;
            }
        }

        #contentWrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        #instructionDiv {
            text-align: center;
            font-family: 'Asap', sans-serif;
            font-weight: bold;
            font-size: 2.5rem;
            color: white;
        }

        #instructionDiv img {
            height: 1.5rem;
            vertical-align: middle;
            margin: 0 8px;
        }
    </style>
</head>
<body>
    <div id="contentWrapper">
        <div id="nameContainer">
            <div id="iconArea"></div>
            <div id="nameDisplay">Giddy Streaming Unicorn</div>
        </div>
        <div id="instructionDiv">
            Press <img src="https://turntables.dev/namegenerator/outlines-pc_space_outline.png" alt="Space"> to generate a new name
        </div>
    </div>
    
    <script>
        let nameData = null;
        
        (function() {
            const url = 'https://turntables.dev/namegenerator/playername_dictionary%20(thanks%20floyzi).json';
            
            fetch(url, { cache: 'no-store' })
            .then(r => { if (!r.ok) throw 0; return r.json(); })
            .then(d => {
                nameData = d;
                generateName();
            })
            .catch((error) => {
                console.error(error);
                document.getElementById('nameDisplay').textContent = 'dint wjork';
            });
        })();
        
        function getRandomWord(array) {
            return array[Math.floor(Math.random() * array.length)].word;
        }
        
        function generateName() {
            const englishNameData = nameData[0];
            
            const first = getRandomWord(englishNameData.first_words);
            const second = getRandomWord(englishNameData.second_words);
            const third = getRandomWord(englishNameData.third_words);
            
            const nameDisplay = document.getElementById('nameDisplay');
            nameDisplay.textContent = `${first} ${second} ${third}`;
        }

        function playGenerationSounds() {
            const baseUrl = 'https://turntables.dev/namegenerator/';
            
            new Audio(baseUrl + 'UI_MainMenu_NameGenerator_Generate.wav').play().catch(e => console.log(e));
            
            const endNum = Math.floor(Math.random() * 3) + 1;
            new Audio(baseUrl + `UI_MainMenu_NameGenerator_End_0${endNum}.wav`).play().catch(e => console.log(e));
            
            const voNum = Math.floor(Math.random() * 7) + 1;
            new Audio(baseUrl + `UI_MainMenu_NameGenerator_End_VO_0${voNum}.wav`).play().catch(e => console.log(e));
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                const nameContainer = document.getElementById('nameContainer');
                const nameDisplay = document.getElementById('nameDisplay');
                nameContainer.classList.remove('pulse');
                nameDisplay.classList.remove('pulse');
                void nameContainer.offsetWidth;
                nameContainer.classList.add('pulse');
                nameDisplay.classList.add('pulse');
                generateName();
                playGenerationSounds();
            }
        });
    </script>


</body></html>
